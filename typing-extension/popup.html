<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 220px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; text-align: center; margin: 0; }
    h3 { margin-top: 0; color: #38bdf8; font-size: 16px; margin-bottom: 15px; letter-spacing: 0.5px; }
    .slider-container { margin-bottom: 20px; background: #1e293b; padding: 10px; border-radius: 6px; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06); }
    label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 5px; }
    .speed-display { font-size: 24px; font-weight: bold; color: #38bdf8; margin-bottom: 5px; }
    input[type=range] { width: 100%; accent-color: #38bdf8; cursor: pointer; }
    button { background: #2563eb; color: white; border: none; padding: 10px 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 14px; transition: background 0.2s; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h3>Salvaa Solutions</h3>
  
  <div class="slider-container">
    <label for="wpmSlider">TARGET SPEED</label>
    <div class="speed-display"><span id="wpmValue">72</span> <span style="font-size: 14px; color: #94a3b8;">WPM</span></div>
    <input type="range" id="wpmSlider" min="40" max="140" value="72">
  </div>

  <button id="startBtn">Start Auto-Type</button>

  <script src="popup.js"></script>
</body>
</html>
